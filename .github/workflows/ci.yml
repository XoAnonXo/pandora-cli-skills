name: CI

on:
  push:
    tags-ignore:
      - "*"
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Secret and token scan
        run: npm run check:secret-scan

  validate:
    name: "${{ matrix.os }} / Node ${{ matrix.node }}"
    runs-on: ${{ matrix.os }}
    needs: [secret-scan]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci

      - name: Install Python build frontend
        run: python -m pip install --disable-pip-version-check --quiet "setuptools>=68" wheel build

      - name: Repo hygiene
        run: npm run check:repo-hygiene

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: npm pack dry-run
        run: npm pack --dry-run

  standalone-sdk-artifacts:
    name: "Standalone SDK Artifacts"
    runs-on: ubuntu-latest
    needs: [secret-scan]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Python build frontend
        run: python3 -m pip install --disable-pip-version-check --quiet "setuptools>=68" wheel build

      - name: Build standalone SDK artifacts
        run: npm run release:build-sdk-artifacts

  benchmark-trust-evidence:
    name: "Benchmark And Trust Evidence"
    runs-on: ubuntu-latest
    needs: [secret-scan]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release trust metadata check
        run: npm run check:release-trust

      - name: Generate benchmark report
        run: node scripts/run_agent_benchmarks.cjs --suite core --write-lock --out benchmarks/latest/core-report.json

      - name: Verify benchmark gate
        run: npm run benchmark:check

      - name: Upload benchmark evidence artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-evidence-${{ github.sha }}
          path: |
            benchmarks/latest/core-report.json
            benchmarks/locks/core.lock.json
          if-no-files-found: error

  release-workflow-contract:
    name: "Release Workflow Contract"
    runs-on: ubuntu-latest
    needs: [secret-scan]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Verify verify-once, pack-once, publish-tarball contract
        shell: bash
        run: |
          set -euo pipefail

          grep -q 'Verify Once, Pack Once, Publish Tarball' .github/workflows/release.yml
          grep -q 'Pack release tarball once and build checksums' .github/workflows/release.yml
          grep -q 'Publish packed tarball to npm' .github/workflows/release.yml
          grep -q 'Upload packed tarball and release assets' .github/workflows/release.yml
          grep -c 'TARBALL="$(npm pack | tail -n 1)"' .github/workflows/release.yml | grep -qx '1'
          grep -q 'npm publish "${{ steps.pack.outputs.tarball }}" --access public --provenance' .github/workflows/release.yml
          grep -q 'verify-once, pack-once, publish-tarball model' docs/trust/release-verification.md
          grep -q 'verify-once, pack-once, publish-tarball' docs/trust/release-bundle-playbook.md
          grep -q 'verify-once, pack-once, publish-tarball model' docs/trust/final-readiness-signoff.md
