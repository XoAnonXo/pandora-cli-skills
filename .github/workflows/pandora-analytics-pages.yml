name: Deploy GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'
  push:
    branches:
      - main
      - master
    paths:
      - 'website/**'
      - 'analytics/dune/mega/**'
      - 'analytics/dune/panel_registry.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pandora-analytics-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install website dependencies
        run: npm --prefix website ci

      - name: Verify website
        run: npm run test:website

      - name: Build website
        run: npm --prefix website run build

      - name: Prepare Pages root
        run: |
          rm -rf ./dist/pages
          mkdir -p ./dist/pages
          cp -R website/dist/. ./dist/pages/
          touch ./dist/pages/.nojekyll

      - name: Build static analytics site from indexer
        run: node analytics/dune/mega/export-static.cjs --out ./dist/pages/analytics

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
