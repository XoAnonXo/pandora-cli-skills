name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  validate:
    name: "${{ matrix.os }} / Node ${{ matrix.node }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  release:
    name: Package and Publish Artifacts
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release prep
        run: npm run release:prep

      - name: Build npm package and checksums
        id: pack
        shell: bash
        run: |
          set -euo pipefail

          TARBALL="$(npm pack | tail -n 1)"
          test -f "$TARBALL"

          sha256sum "$TARBALL" > "$TARBALL.sha256"

          {
            echo "tarball=$TARBALL"
            echo "checksum_file=$TARBALL.sha256"
          } >> "$GITHUB_OUTPUT"

      - name: Generate SBOM and aggregate checksums
        id: sbom
        shell: bash
        run: |
          set -euo pipefail

          SBOM_FILE="sbom.spdx.json"
          node scripts/generate_sbom.cjs --format spdx --output "$SBOM_FILE"
          test -f "$SBOM_FILE"

          sha256sum "$SBOM_FILE" > "$SBOM_FILE.sha256"
          cat "${{ steps.pack.outputs.checksum_file }}" "$SBOM_FILE.sha256" > checksums.sha256

          {
            echo "sbom_file=$SBOM_FILE"
            echo "sbom_checksum_file=$SBOM_FILE.sha256"
          } >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Generate GitHub artifact attestation
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - name: Prepare attestation bundle asset
        id: attestation_asset
        shell: bash
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          set -euo pipefail

          BUNDLE_ASSET="${TARBALL}.intoto.jsonl"
          cp "$BUNDLE_PATH" "$BUNDLE_ASSET"

          echo "bundle_asset=$BUNDLE_ASSET" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub SBOM attestation
        uses: actions/attest-sbom@bd218ad0dbcb3e146bd073d1d9c6d78e08aa8a0b # v2
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}
          sbom-path: ${{ steps.sbom.outputs.sbom_file }}

      - name: Generate GitHub SBOM asset attestation
        id: attest_sbom_asset
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.sbom.outputs.sbom_file }}

      - name: Prepare SBOM attestation bundle asset
        id: sbom_attestation_asset
        shell: bash
        env:
          SBOM_FILE: ${{ steps.sbom.outputs.sbom_file }}
          BUNDLE_PATH: ${{ steps.attest_sbom_asset.outputs.bundle-path }}
        run: |
          set -euo pipefail

          BUNDLE_ASSET="${SBOM_FILE}.intoto.jsonl"
          cp "$BUNDLE_PATH" "$BUNDLE_ASSET"

          echo "bundle_asset=$BUNDLE_ASSET" >> "$GITHUB_OUTPUT"

      - name: Sign tarball and verify signature (keyless)
        id: sign
        shell: bash
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
          CERT_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${{ github.ref_name }}
        run: |
          set -euo pipefail

          SIG_FILE="$TARBALL.sig"
          CERT_FILE="$TARBALL.pem"

          cosign sign-blob --yes \
            --output-signature "$SIG_FILE" \
            --output-certificate "$CERT_FILE" \
            "$TARBALL"

          cosign verify-blob \
            --signature "$SIG_FILE" \
            --certificate "$CERT_FILE" \
            --certificate-identity "$CERT_IDENTITY" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$TARBALL" >/dev/null

          {
            echo "signature_file=$SIG_FILE"
            echo "certificate_file=$CERT_FILE"
          } >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-package-${{ github.ref_name }}
          path: |
            ${{ steps.pack.outputs.tarball }}
            ${{ steps.pack.outputs.checksum_file }}
            sbom.spdx.json
            sbom.spdx.json.sha256
            ${{ steps.sbom_attestation_asset.outputs.bundle_asset }}
            checksums.sha256
            ${{ steps.attestation_asset.outputs.bundle_asset }}
            ${{ steps.sign.outputs.signature_file }}
            ${{ steps.sign.outputs.certificate_file }}
          if-no-files-found: error

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: |
            ${{ steps.pack.outputs.tarball }}
            ${{ steps.pack.outputs.checksum_file }}
            sbom.spdx.json
            sbom.spdx.json.sha256
            ${{ steps.sbom_attestation_asset.outputs.bundle_asset }}
            checksums.sha256
            ${{ steps.attestation_asset.outputs.bundle_asset }}
            ${{ steps.sign.outputs.signature_file }}
            ${{ steps.sign.outputs.certificate_file }}
          generate_release_notes: true
